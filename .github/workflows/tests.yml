name: tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked
      - name: Lint
        run: uv run --locked ruff check .
      - name: Format
        run: uv run --locked ruff format --check .
      - name: Tests
        run: uv run --locked pytest tests/ -q
